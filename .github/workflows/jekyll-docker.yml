name: AWS Deploy using OIDC

on:
  push:
    branches: [ "main" ]

# Top-level permissions required for OIDC authentication
permissions:
  id-token: write  # Critical: Mandatory to request the JWT token
  contents: read   # Necessary to checkout the repository code

jobs:
  aws-deployment:
    runs-on: self-hosted  # Or ubuntu-latest if using GitHub hosted runners
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Replace with your actual IAM Role ARN or use a GitHub Secret/Variable
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-oidc-role
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Verify AWS Identity Connection
        run: |
          aws sts get-caller-identity

